name: Release CLI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

# Single source of truth for build matrix. Adding a new platform = one edit
# here (matrix include) + ensure update-homebrew Formula template supports it.
# Downstream jobs (release, update-homebrew, verify-checksums) discover the
# artifacts dynamically from the upload-artifact filenames.

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            platform: darwin-arm64
            runner: macos-latest
          - target: x86_64-apple-darwin
            platform: darwin-x86_64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          ARCHIVE="claude-in-mobile-${{ steps.version.outputs.version }}-${{ matrix.platform }}.tar.gz"
          tar -czf "$ARCHIVE" -C cli/target/${{ matrix.target }}/release claude-in-mobile
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            claude-in-mobile-*.tar.gz
            claude-in-mobile-*.tar.gz.sha256

  verify-plugin-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify package.json, marketplace.json, plugin.json match tag
        run: |
          TAG="${{ steps.version.outputs.version }}"
          FAIL=0

          PKG=$(jq -r '.version' package.json)
          MARKET=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          PLUGIN=$(jq -r '.version' cli/plugin/.claude-plugin/plugin.json)
          CARGO=$(grep '^version =' cli/Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')

          echo "Tag:                                   $TAG"
          echo "package.json:                          $PKG"
          echo "cli/Cargo.toml:                        $CARGO"
          echo ".claude-plugin/marketplace.json:       $MARKET"
          echo "cli/plugin/.claude-plugin/plugin.json: $PLUGIN"

          for KIND in PKG CARGO MARKET PLUGIN; do
            VAL=$(eval echo \$$KIND)
            if [ "$VAL" != "$TAG" ]; then
              echo "::error::$KIND version ($VAL) does not match tag ($TAG)"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Version drift detected. All four version fields must equal the tag."
            exit 1
          fi
          echo "All versions match tag $TAG"

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tar.gz"

  publish-npm:
    needs: [build, verify-plugin-versions]
    runs-on: ubuntu-latest
    # `--provenance` on `npm publish` mints a Sigstore attestation linking
    # the published tarball to this exact workflow run. The npm CLI rejects
    # the publish unless the workflow has `id-token: write` granted.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Discover platforms and SHAs
        id: sha
        # Build a JSON map { "<platform>": "<sha>" } from the .sha256 files.
        # Downstream consumers (Formula update, verify-checksums) iterate over
        # this map instead of hardcoded arch names.
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAP="{}"
          PLATFORMS=()
          for f in claude-in-mobile-${VERSION}-*.tar.gz.sha256; do
            BASE=$(basename "$f" .tar.gz.sha256)
            PLATFORM="${BASE#claude-in-mobile-${VERSION}-}"
            SHA=$(awk '{print $1}' "$f")
            MAP=$(echo "$MAP" | jq -c --arg p "$PLATFORM" --arg s "$SHA" '. + {($p): $s}')
            PLATFORMS+=("$PLATFORM")
          done
          # jq -c keeps MAP single-line: GITHUB_OUTPUT rejects multiline values
          echo "map=$MAP" >> "$GITHUB_OUTPUT"
          echo "platforms=${PLATFORMS[*]}" >> "$GITHUB_OUTPUT"
          echo "Discovered platforms: ${PLATFORMS[*]}"
          echo "Map: $MAP"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: AlexGladkov/homebrew-claude-in-mobile
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        working-directory: homebrew-tap
        env:
          SHA_MAP: ${{ steps.sha.outputs.map }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PYTHON'
          import json, os, re

          version = os.environ["VERSION"]
          sha_map = json.loads(os.environ["SHA_MAP"])
          path = "Formula/claude-in-mobile.rb"

          with open(path) as f:
              content = f.read()

          content = re.sub(r'version ".*?"', f'version "{version}"', content)

          # Replace shas in the order they appear in the Formula. The Formula
          # template's order must match the (deterministic) platform order
          # returned by the discovery step.
          shas = [sha_map[p] for p in sorted(sha_map.keys())]
          sha_iter = iter(shas)
          def replace_sha(m):
              try:
                  return f'sha256 "{next(sha_iter)}"'
              except StopIteration:
                  return m.group(0)
          content = re.sub(r'sha256 "[a-f0-9]{64}"', replace_sha, content)

          with open(path, "w") as f:
              f.write(content)
          PYTHON

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-in-mobile.rb
          git diff --cached --quiet && exit 0
          git commit -m "Update claude-in-mobile to ${{ steps.version.outputs.version }}"
          git push

  verify-checksums:
    needs: update-homebrew
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and verify against formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        # Loops over every release asset matching the version, so adding a
        # platform to the build matrix automatically enrolls it in checksum
        # verification with no further edits here.
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="AlexGladkov/claude-in-mobile"
          TAP_REPO="AlexGladkov/homebrew-claude-in-mobile"
          FAILED=0

          echo "::group::Fetching formula from tap"
          gh api "repos/${TAP_REPO}/contents/Formula/claude-in-mobile.rb" --jq '.content' | base64 -d > formula.rb
          cat formula.rb
          echo "::endgroup::"

          ASSETS=$(gh api "repos/${REPO}/releases/tags/v${VERSION}" \
            --jq '.assets[] | select(.name | endswith(".tar.gz")) | .name')

          if [ -z "$ASSETS" ]; then
            echo "::error::No tar.gz assets found in release v${VERSION}"
            exit 1
          fi

          while IFS= read -r ASSET; do
            URL="https://github.com/${REPO}/releases/download/v${VERSION}/${ASSET}"
            echo "::group::Verifying ${ASSET}"
            echo "Downloading ${URL}"
            curl -fsSL -o "${ASSET}" "${URL}"

            ACTUAL=$(shasum -a 256 "${ASSET}" | awk '{print $1}')
            echo "Actual SHA256: ${ACTUAL}"

            if ! grep -q "${ACTUAL}" formula.rb; then
              echo "::error::Checksum mismatch for ${ASSET}! Formula does not contain ${ACTUAL}"
              FAILED=1
            else
              echo "Checksum verified for ${ASSET}"
            fi
            echo "::endgroup::"
          done <<< "$ASSETS"

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Checksum verification failed! Release assets do not match the Homebrew formula."
            echo "::error::This usually means release assets were manually replaced after CI updated the formula."
            exit 1
          fi

          echo "All checksums verified successfully"
